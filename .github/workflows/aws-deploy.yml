name: Deploy to AWS ECR and App Runner

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1                  
  ECR_REPOSITORY: mahafund-brief           
  APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}

jobs:
  deploy:
    name: Build & Deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build a docker container and push it to ECR
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Validate App Runner Service ARN
      run: |
        if [ -z "${{ secrets.APP_RUNNER_SERVICE_ARN }}" ]; then
          echo "ERROR: APP_RUNNER_SERVICE_ARN secret is not set. Add it in repository secrets (Settings → Secrets and variables → Actions)."
          exit 1
        fi
      shell: bash

    - name: Deploy to App Runner Image
      id: deploy-apprunner
      env:
        SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cat > /tmp/source-config.json <<EOF
        {
          "ImageRepository": {
            "ImageIdentifier": "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}",
            "ImageRepositoryType": "ECR"
          }
        }
        EOF
        if [ -z "$SERVICE_ARN" ]; then
          echo "SERVICE_ARN is empty; aborting."
          exit 1
        fi
        echo "Deploying to service: ${SERVICE_ARN:0:20}... (masked)"
        aws apprunner update-service \
          --service-arn "$SERVICE_ARN" \
          --source-configuration file:///tmp/source-config.json
